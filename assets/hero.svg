<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="248" y1="516" x2="1352" y2="516" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.5" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="shadow" x="192" y="220" width="1216" height="420" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1600" height="900" rx="36" fill="url(#bg)"/>

  <circle cx="1210" cy="152" r="120" fill="#1D4ED8" fill-opacity="0.10"/>
  <circle cx="1310" cy="748" r="170" fill="#7C3AED" fill-opacity="0.10"/>
  <circle cx="246" cy="760" r="140" fill="#F59E0B" fill-opacity="0.08"/>

  <text x="800" y="130" text-anchor="middle" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="800">
    DeepPaperNote
  </text>
  <text x="800" y="190" text-anchor="middle" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="500">
    Turn one research paper into a high-quality Obsidian note
  </text>

  <g filter="url(#shadow)">
    <rect x="248" y="280" width="360" height="292" rx="28" fill="#0F172A" stroke="#334155" stroke-width="2"/>
