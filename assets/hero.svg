    </text>
    <rect x="286" y="380" width="284" height="24" rx="8" fill="#334155"/>
    <rect x="286" y="424" width="250" height="24" rx="8" fill="#334155"/>
    <rect x="286" y="468" width="270" height="24" rx="8" fill="#334155"/>
    <rect x="286" y="512" width="190" height="24" rx="8" fill="#334155"/>
    <text x="304" y="397" fill="#93C5FD" font-family="Menlo, monospace" font-size="18">PDF + metadata + figures</text>
    <text x="304" y="441" fill="#C4B5FD" font-family="Menlo, monospace" font-size="18">Zotero-first when available</text>
    <text x="304" y="485" fill="#FDE68A" font-family="Menlo, monospace" font-size="18">Extract, normalize, verify</text>
    <text x="304" y="529" fill="#BFDBFE" font-family="Menlo, monospace" font-size="18">Build synthesis bundle</text>
  </g>

  <path d="M656 426C736 426 768 426 844 426C920 426 952 426 1032 426" stroke="url(#accent)" stroke-width="18" stroke-linecap="round"/>
  <path d="M1012 388L1088 426L1012 464" stroke="#F8FAFC" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)">
    <rect x="992" y="280" width="360" height="292" rx="28" fill="#0F172A" stroke="#334155" stroke-width="2"/>
    <rect x="1012" y="308" width="320" height="42" rx="12" fill="#1E293B"/>
    <text x="1172" y="336" text-anchor="middle" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">
      Obsidian Note
    </text>
    <rect x="1030" y="380" width="284" height="24" rx="8" fill="#334155"/>
    <rect x="1030" y="424" width="260" height="24" rx="8" fill="#334155"/>
    <rect x="1030" y="468" width="294" height="24" rx="8" fill="#334155"/>
    <rect x="1030" y="512" width="220" height="24" rx="8" fill="#334155"/>
    <text x="1048" y="397" fill="#86EFAC" font-family="Menlo, monospace" font-size="18">Structured deep-reading note</text>
    <text x="1048" y="441" fill="#BFDBFE" font-family="Menlo, monospace" font-size="18">Model-first interpretation</text>
    <text x="1048" y="485" fill="#FDE68A" font-family="Menlo, monospace" font-size="18">Placeholder-first figures</text>
    <text x="1048" y="529" fill="#C4B5FD" font-family="Menlo, monospace" font-size="18">Folder-per-paper output</text>
  </g>

  <rect x="402" y="658" width="796" height="92" rx="22" fill="#111827" stroke="#334155" stroke-width="2"/>
  <text x="800" y="708" text-anchor="middle" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700">
